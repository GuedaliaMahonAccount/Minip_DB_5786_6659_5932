#-------------
# PostgreSQL
#-------------

db:
  image: postgres:15
  container_name: postgres
  ports:
    - "5432:5432"
  environment:
    POSTGRES_USER: ${DB_USER_SECRET}
    POSTGRES_PASSWORD: ${DB_PASSWORD_SECRET}
    POSTGRES_DB: ${DB_NAME_SECRET}
  volumes:
    - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

#-------------  
# Adminer
#-------------

adminer:
  image: adminer:latest
  container_name: adminer
  ports:
    - "8080:8080"
  environment:
    ADMINER_DEFAULT_SERVER: postgres
  depends_on:
    - postgres

#-------------  
# pgAdmin
#-------------

pgadmin:
  image: dpage/pgadmin4
  container_name: pgadmin
  ports:
    - "5050:80"
  environment:
    PGADMIN_DEFAULT_EMAIL: [EMAIL_ADDRESS]
    PGADMIN_DEFAULT_PASSWORD: [PASSWORD]
  depends_on:
    - postgres

#-----------
# Network
#-----------

networks:
  default:
    driver: bridge