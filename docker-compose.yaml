services:
  #---------------
  # PostgresSQL Database
  #---------------
  db:
    image: postgres:17.1
    container_name: PostgreSQL_DB
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER_SECRET}
      POSTGRES_PASSWORD: ${DB_PASSWORD_SECRET}
      POSTGRES_DB: ${DB_NAME_SECRET}
    ports:
      - "5445:5432"
    volumes:
      - ./Shlav1/createTables.sql:/docker-entrypoint-initdb.d/01_createTables.sql
      - ./Shlav1/mockarooFiles/mockaroo_veterinarians.sql:/docker-entrypoint-initdb.d/02_mockaroo_veterinarians.sql
      # NOTE: insertTables.sql must be run MANUALLY in pgAdmin
      #        AFTER importing Animal data from MOCK_DATA.csv,
      #        because MedicalVisit has foreign keys to both Animal and Veterinarian.
      # - ./Shlav1/Programing/insertTables.sql:/docker-entrypoint-initdb.d/03_insertTables.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - kids_network
  #----------------
  # pgAdmin
  #---------------- 
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgAdminApp
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - kids_network
#----------------
# Network
#----------------
networks:
  kids_network:
    #    driver: bridge
    #----------------
    # Volumes
    #---------------- 
volumes:
  postgres_data:
  pgadmin_data: